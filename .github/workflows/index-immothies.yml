# Workflow GitHub Actions pour immothies-dakar.com
name: Index immothies-dakar.com

on:
  workflow_dispatch:
    inputs:
      indexing_mode:
        description: 'Mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - google_only
          - bing_only

  schedule:
    - cron: '0 6 * * *'

env:
  SITE_URL: 'https://immothies-dakar.com'

jobs:
  index:
    name: Indexation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Indexing
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          PRIORITY_ONLY: ${{ github.event.inputs.indexing_mode == 'priority_only' }}
          SKIP_GOOGLE: ${{ github.event.inputs.indexing_mode == 'bing_only' }}
          SKIP_INDEXNOW: ${{ github.event.inputs.indexing_mode == 'google_only' }}
        run: node run-indexer.js

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: indexing-reports
          path: reports/
